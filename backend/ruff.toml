line-length = 100
indent-width = 4
target-version = "py39"

[lint]
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"
select = [
    "ALL",
]
ignore = [
    "D100",
    "D101",
    "D102",
    "D103",
    "D104",
    "D105",
    "D106",
    "D203",
    "D212",
    "D213",
    "COM812",
    "PIE804",
    "FA100",
    "SIM300",
    "PTH118",
    "E711",
    "ANN401"
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]

[lint.pylint]
max-args = 10

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = false
line-ending = "auto"

exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]
